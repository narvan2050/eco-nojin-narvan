name: Sync Nellavio Template

on:
  workflow_dispatch:  # فقط با کلیک دستی اجرا می‌شود

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          path: target

      - name: Clone template repository
        uses: actions/checkout@v4
        with:
          repository: nellavio/nellavio
          path: template

      - name: Copy template files to target
        run: |
          rsync -av --exclude='.git' --exclude='README.md' --exclude='.github/workflows/' template/ target/
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Sync files from Nellavio template"
          git push
