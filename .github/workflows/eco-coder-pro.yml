name: "Eco Coder Pro – نسخه پایدار"

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      task:
        description: 'وظیفه'
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  agent:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'agent-task'))
    runs-on: ubuntu-latest
    steps:
      - name: دریافت کد
        uses: actions/checkout@v4

      - name: نصب Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ایجاد اسکریپت برنامه‌ریزی
        run: |
          cat << 'SCRIPT' > /tmp/plan-agent.mjs
          import { writeFileSync } from 'fs';

          const prompt = process.argv[2];
          if (!prompt) {
            console.error("No prompt provided");
            process.exit(1);
          }

          const models = [
            'gpt-4o-mini',
            'Phi-3-medium-128k-instruct',
            'Llama-3.1-70B-Instruct',
            'gpt-4o'
          ];

          const token = process.env.GITHUB_TOKEN;
          const repo = process.env.GITHUB_REPOSITORY;

          const system = `You are an expert full-stack developer. Based on the user request, produce a JSON object with key "files". "files" is an array of { "path": "...", "content": "..." }. Only include files to CREATE or whose ENTIRE content must be REPLACED. If no code changes are needed, return {"files": []}. Do NOT include any text outside the JSON.`;

          async function tryModel(model) {
            console.log(`Trying model: ${model}`);
            const res = await fetch(`https://models.github.com/${repo}/chat/completions`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: model,
                messages: [
                  { role: 'system', content: system },
                  { role: 'user', content: prompt }
                ],
                temperature: 0.2
              })
            });
            if (!res.ok) {
              throw new Error(`HTTP ${res.status} ${res.statusText}`);
            }
            const data = await res.json();
            const text = data.choices[0].message.content;
            const jsonMatch = text.match(/\{[\s\S]*\}/);
            if (!jsonMatch) throw new Error('No JSON found');
            const plan = JSON.parse(jsonMatch[0]);
            if (!plan.files || !Array.isArray(plan.files)) throw new Error('Invalid plan');
            return plan;
          }

          async function main() {
            for (const model of models) {
              try {
                const plan = await tryModel(model);
                writeFileSync('/tmp/plan.json', JSON.stringify(plan));
                console.log(`Success with model ${model}`);
                return;
              } catch (e) {
                console.warn(`Model ${model} failed: ${e.message}`);
              }
            }
            console.error("All models failed");
            process.exit(1);
          }

          main();
          SCRIPT

      - name: دریافت دستور کاربر
        id: prompt
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TASK: ${{ github.event.inputs.task }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            echo "PROMPT=$INPUT_TASK" >> $GITHUB_OUTPUT
          else
            echo "PROMPT=$(cat << 'EOF'
          $ISSUE_TITLE
          $ISSUE_BODY
          EOF
          )" >> $GITHUB_OUTPUT
          fi

      - name: اجرای اسکریپت برنامه‌ریزی
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node /tmp/plan-agent.mjs "${{ steps.prompt.outputs.PROMPT }}"

      - name: ساخت فایل‌ها و Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan;
            try {
              plan = JSON.parse(fs.readFileSync('/tmp/plan.json', 'utf8'));
            } catch (e) {
              console.log('No plan file found, skipping.');
              return;
            }
            if (!plan.files || plan.files.length === 0) return;

            const branchName = `agent-task-${context.issue?.number || Date.now()}`;
            const baseRef = context.payload.repository.default_branch;
            const baseSha = (await github.rest.git.getRef({
              owner: context.repo.owner, repo: context.repo.repo, ref: `heads/${baseRef}`
            })).data.object.sha;

            await github.rest.git.createRef({
              owner: context.repo.owner, repo: context.repo.repo,
              ref: `refs/heads/${branchName}`, sha: baseSha
            });

            for (const file of plan.files) {
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner, repo: context.repo.repo,
                path: file.path,
                message: `Update ${file.path}`,
                content: Buffer.from(file.content).toString('base64'),
                branch: branchName
              });
            }

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `🤖 Agent: ${context.payload.issue?.title || 'Task'}`,
              head: branchName, base: baseRef,
              body: `Auto-generated PR by Eco Coder Pro.\n\nTask: ${context.payload.issue?.body || '${{ steps.prompt.outputs.PROMPT }}'}`
            });

            if (context.payload.issue) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner, repo: context.repo.repo,
                body: `✅ PR created: ${pr.data.html_url}`
              });
            }
