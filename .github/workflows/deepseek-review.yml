name: DeepSeek Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          cat diff.txt

      - name: AI Review with DeepSeek & Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('diff.txt', 'utf8');
            
            // Call DeepSeek API
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ${{ secrets.DEEPSEEK_API_KEY }}'
              },
              body: JSON.stringify({
                model: 'deepseek-chat',
                messages: [
                  {
                    role: 'system',
                    content: 'You are a senior code reviewer. Summarize the changes, point out potential bugs, security issues, and suggest improvements. Be concise and use bullet points. Answer in English.'
                  },
                  {
                    role: 'user',
                    content: 'Please review this pull request diff:\n\n' + diff
                  }
                ]
              })
            });

            const data = await response.json();
            const review = data.choices[0].message.content;

            // Post comment on the PR
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🤖 بازبینی هوشمند DeepSeek\n\n' + review
            });
